<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex de Luxo | Coleção Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --poke-red: #ff1f1f;
            --poke-gold: #ffd700;
            --poke-dark-card: #151515;
            --luxury-gradient: linear-gradient(135deg, #ffd700 0%, #b8860b 50%, #ffd700 100%);
            --gold-glow: drop-shadow(0 0 15px rgba(255, 215, 0, 0.8));
        }

        /* PROTEÇÃO: Impede seleção de texto em todo o documento */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; font-family: 'Exo 2', sans-serif; 
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
        }

        body {
            background: #0a0a0a;
            color: white;
            padding-bottom: 50px;
            overflow-x: hidden;
        }

        /* PROTEÇÃO: Impede arrastar imagens e vídeos, e remove controles nativos do vídeo */
        img, video {
            pointer-events: none;
            -webkit-user-drag: none;
            user-drag: none;
            -webkit-touch-callout: none;
        }
        video::-webkit-media-controls {
            display: none !important;
        }

        header {
            background: var(--poke-red);
            padding: 20px;
            text-align: center;
            border-bottom: 5px solid #000;
            position: sticky; top: 0; z-index: 1000;
        }

        .progress-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            max-width: 400px;
            margin: 10px auto 0;
        }

        .progress-container {
            flex: 1;
            background: rgba(0,0,0,0.3);
            height: 12px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.2);
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--luxury-gradient);
            transition: width 0.5s ease;
            box-shadow: 0 0 10px var(--poke-gold);
        }
        
        #progressCount {
            font-size: 0.85rem;
            color: white;
            font-weight: bold;
            min-width: 60px;
            text-align: left;
        }

        .gen-nav {
            background: #111;
            padding: 10px;
            display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;
        }

        .gen-btn {
            background: #222; border: 1px solid #444; color: #888;
            padding: 5px 12px; border-radius: 15px; cursor: pointer; font-size: 0.7rem;
            display: flex; align-items: center; gap: 5px;
        }

        .gen-btn.locked {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .gen-btn.active {
            background: var(--luxury-gradient); color: black; box-shadow: 0 0 10px var(--poke-gold);
        }

        .capture-zone {
            max-width: 500px; margin: 20px auto; background: #151515;
            padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #333;
        }

        .pokeball-display {
            width: 150px; height: 150px; margin: 0 auto 20px;
            background: linear-gradient(var(--poke-red) 50%, white 50%);
            border-radius: 50%; border: 8px solid #000;
            position: relative;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .pokeball-display::before {
            content: ""; position: absolute; width: 100%; height: 8px;
            background: #000; top: 50%; transform: translateY(-50%);
        }

        .pokeball-display::after {
            content: ""; position: absolute; width: 40px; height: 40px;
            background: #fff; border: 6px solid #000; border-radius: 50%;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 1;
        }

        .lucky-number {
            position: relative; z-index: 2;
            font-size: 3rem; font-weight: 900; color: white;
            text-shadow: 3px 3px 0 #000, -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000;
        }

        .pokeball-display.rolling { animation: shake 0.2s infinite; }

        .pokedex-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px; max-width: 1100px; margin: auto; padding: 20px;
            perspective: 1000px;
        }

        .pokemon-slot {
            aspect-ratio: 1/1; 
            position: relative;
            cursor: default;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .pokemon-slot.unlocked { cursor: pointer; }
        .pokemon-slot.revealed { transform: rotateY(180deg); }

        .slot-face {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid #333;
        }

        .slot-back {
            background: #1a1a1a;
            color: #2a2a2a;
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -1px;
        }
        
        .unlocked .slot-back {
            border-color: var(--poke-gold);
            animation: pulse 2s infinite;
            color: var(--poke-gold);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .target-pulse .slot-back {
            animation: pulse-active 0.8s infinite alternate !important;
            border: 3px solid #fff;
            z-index: 10;
        }

        @keyframes pulse-active {
            from { box-shadow: 0 0 5px var(--poke-gold); transform: scale(1); }
            to { box-shadow: 0 0 25px var(--poke-gold), 0 0 40px #fff; transform: scale(1.05); }
        }

        .slot-front {
            background: var(--poke-dark-card);
            transform: rotateY(180deg);
            border: 2px solid var(--poke-gold);
            overflow: hidden;
        }

        .slot-front::after {
            content: ""; 
            position: absolute; 
            top: 0; 
            left: -150%; 
            width: 100%; 
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.2), rgba(255, 255, 255, 0.6), rgba(255, 215, 0, 0.2), transparent);
            transform: skewX(-25deg);
            transition: 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .pokemon-slot.revealed:hover .slot-front::after {
            left: 150%;
        }

        .pokemon-img {
            width: 85%; height: 85%;
            filter: var(--gold-glow);
            object-fit: contain;
        }

        .slot-id { position: absolute; top: 8px; left: 10px; font-size: 0.7rem; color: var(--poke-gold); }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none;
            justify-content: center; align-items: center; z-index: 2000;
            perspective: 1500px;
        }

        .modal-card {
            width: 266px; height: 350px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .modal-card.flipped {
            transform: rotateY(180deg);
        }

        .modal-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            border: 3px solid var(--poke-gold);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: var(--poke-dark-card);
            box-shadow: 0 0 30px rgba(255, 214, 0, 0.3);
            padding: 15px;
        }

        .modal-face-back {
            transform: rotateY(180deg);
            background: #000;
            padding: 0;
            overflow: hidden;
        }

        .modal-video {
            width: 100%; height: 100%;
            object-fit: cover;
            border-radius: 17px;
        }

        .modal-face img { width: 190px; filter: var(--gold-glow); }
        .modal-face h2 { color: var(--poke-gold); margin-top: 10px; font-size: 1.5rem; text-transform: uppercase; }
        .modal-face p { color: #888; font-size: 1rem; margin-top: 3px; }

        .congrats-card {
            background: #000; border: 5px solid var(--poke-gold);
            padding: 50px; border-radius: 40px; text-align: center;
            animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 90%;
            position: relative;
            z-index: 3001;
        }
        .congrats-card h1 { color: var(--poke-gold); font-size: 3rem; margin-bottom: 10px; text-shadow: 0 0 20px var(--poke-gold); }
        .congrats-card p { font-size: 1.5rem; color: #fff; margin-bottom: 30px; }

        @keyframes zoomIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .btn-capture {
            background: var(--luxury-gradient); color: black; border: none;
            padding: 15px 40px; border-radius: 30px; font-weight: bold;
            cursor: pointer; text-transform: uppercase; font-size: 1rem;
            transition: background 0.3s, color 0.3s;
        }

        .btn-capture:disabled {
            background: #444 !important;
            color: #888 !important;
            cursor: not-allowed;
            box-shadow: none !important;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 215, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
        }

        @keyframes shake {
            0% { transform: translate(0,0) rotate(0); }
            25% { transform: translate(5px,0) rotate(5deg); }
            50% { transform: translate(0,0) rotate(0); }
            75% { transform: translate(-5px,0) rotate(-5deg); }
            100% { transform: translate(0,0) rotate(0); }
        }
    </style>
</head>
<!-- PROTEÇÃO: Eventos direto na tag body para bloquear atalhos de mouse e teclado básicos -->
<body oncontextmenu="return false;" ondragstart="return false;" onselectstart="return false;" oncopy="return false;" oncut="return false;" onpaste="return false;">

<header>
    <h2 id="gen-title">REGIÃO DE KANTO</h2>
    <div class="progress-wrapper">
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <span id="progressCount">0/0</span>
    </div>
</header>
<div class="gen-nav" id="genNav"></div>

<section class="capture-zone">
    <div class="pokeball-display" id="pokeBall">
        <span class="lucky-number" id="pokeNum">?</span>
    </div>
    <button class="btn-capture" id="rollBtn" onclick="startCapture()">Capturar Pokémon</button>
</section>

<div class="pokedex-grid" id="pokedex"></div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
    <div class="modal-card" id="modalCard" onclick="flipModal(event)">
        <div class="modal-face modal-face-front">
            <img id="modalImg" src="">
            <p id="modalId">#000</p>
            <h2 id="modalName">NOME</h2>
            <p style="font-size: 0.6rem; color: var(--poke-gold); margin-top: 10px;">CLIQUE PARA VIRAR</p>
        </div>
        <div class="modal-face modal-face-back">
            <!-- PROTEÇÃO: Parâmetros extras no vídeo para bloquear download, PIP e context menu -->
            <video id="modalVideo" class="modal-video" preload="auto" controlsList="nodownload nofullscreen noremoteplayback" disablePictureInPicture oncontextmenu="return false;">
                <source src="" type="video/mp4">
            </video>
        </div>
    </div>
</div>

<div class="modal-overlay" id="congratsOverlay" onclick="this.style.display='none'">
    <div class="congrats-card" onclick="event.stopPropagation()">
        <h1>PARABÉNS!</h1>
        <p id="congratsMsg">Você completou a coleção!</p>
        <button class="btn-capture" onclick="document.getElementById('congratsOverlay').style.display='none'">Mestre Pokémon</button>
    </div>
</div>

<script>
    // --- PROTEÇÕES MÁXIMAS DE JAVASCRIPT ---
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('dragstart', e => e.preventDefault());
    document.addEventListener('selectstart', e => e.preventDefault());
    document.addEventListener('copy', e => e.preventDefault());
    
    document.onkeydown = function(e) {
        if (e.keyCode === 123) return false; // Bloqueia F12
        if (e.ctrlKey && e.shiftKey && e.keyCode === 73) return false; // Bloqueia Ctrl+Shift+I
        if (e.ctrlKey && e.shiftKey && e.keyCode === 74) return false; // Bloqueia Ctrl+Shift+J
        if (e.ctrlKey && e.shiftKey && e.keyCode === 67) return false; // Bloqueia Ctrl+Shift+C
        if (e.ctrlKey && e.keyCode === 85) return false; // Bloqueia Ctrl+U (Ver código-fonte)
        if (e.ctrlKey && e.keyCode === 83) return false; // Bloqueia Ctrl+S (Salvar como)
        if (e.ctrlKey && e.keyCode === 80) return false; // Bloqueia Ctrl+P (Imprimir)
    };
    // ----------------------------------------

    const MAP_PATH = "mapa.json";
    const IMG_BASE = "img/";
    const VIDEO_PATH = "video/";

    let mapaImagens = {};

    async function carregarMapa() {
        try {
            const response = await fetch(MAP_PATH + "?v=" + Date.now());
            if (!response.ok) throw new Error("HTTP " + response.status);
            mapaImagens = await response.json();
            console.log("mapa.json carregado com sucesso", mapaImagens);
        } catch (e) {
            console.error("Erro ao carregar mapa.json", e);
            mapaImagens = {};
        }
    }

    function getImagePath(id) {
        const key = String(id);
        const hash = mapaImagens[key] || mapaImagens[id];
        if (hash) return IMG_BASE + hash;
        return IMG_BASE + id + ".png";
    }

    const pokemonData = {
        1: "Bulbasaur", 1025: "Walking-wake-v2"
    };

    const generations = [
        { name: "Kanto", start: 1, end: 151 },
        { name: "Johto", start: 152, end: 251 },
        { name: "Hoenn", start: 252, end: 386 },
        { name: "Sinnoh", start: 387, end: 493 },
        { name: "Unova", start: 494, end: 649 },
        { name: "Kalos", start: 650, end: 721 },
        { name: "Alola", start: 722, end: 809 },
        { name: "Galar", start: 810, end: 905 },
        { name: "Paldea", start: 906, end: 1025 },
        { name: "Variações", start: 1026, end: 1250 }
    ];

    let currentGen = 0;
    let waitingForReveal = false;
    const unlockedIds = new Set(JSON.parse(localStorage.getItem('luxury_unlocked')) || []);
    const revealedIds = new Set(JSON.parse(localStorage.getItem('luxury_revealed')) || []);

    function save() {
        localStorage.setItem('luxury_unlocked', JSON.stringify([...unlockedIds]));
        localStorage.setItem('luxury_revealed', JSON.stringify([...revealedIds]));
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playRollSound() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    function playRevealSound() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(440, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.5);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
    }

    function playVictorySound() {
        const notes = [523.25, 659.25, 783.99, 1046.50];
        notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime + (i * 0.15));
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime + (i * 0.15));
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + (i * 0.15) + 0.4);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + (i * 0.15));
            osc.stop(audioCtx.currentTime + (i * 0.15) + 0.4);
        });
    }

    function createExplosion(x, y, isFirework = false) {
        const particles = isFirework ? 180 : 120;
        const colors = isFirework ? ['#ffd700', '#ff0000', '#00ff00', '#0000ff', '#ffffff', '#ff00ff'] : ['#ffd700', '#ffffff', '#ff1f1f', '#b8860b'];
        for (let i = 0; i < particles; i++) {
            const spark = document.createElement('div');
            const size = Math.random() * 6 + 2;
            const color = colors[Math.floor(Math.random() * colors.length)];
            spark.style.cssText = `position: fixed; top: ${y}px; left: ${x}px; width: ${size}px; height: ${size}px; background: ${color}; border-radius: 50%; pointer-events: none; z-index: 3000; box-shadow: 0 0 ${size*2}px ${color};`;
            document.body.appendChild(spark);
            const angle = Math.random() * Math.PI * 2;
            const velocity = isFirework ? (6 + Math.random() * 20) : (4 + Math.random() * 12);
            const dx = Math.cos(angle) * velocity * 25;
            const dy = Math.sin(angle) * velocity * 25;
            spark.animate([{ transform: 'translate(0,0) scale(1)', opacity: 1 }, { transform: `translate(${dx}px, ${dy}px) scale(0)`, opacity: 0 }], { duration: 1000 + Math.random() * 500, easing: 'cubic-bezier(0, .9, .57, 1)' }).onfinish = () => spark.remove();
        }
    }

    function launchFireworks() {
        let count = 0;
        const timer = setInterval(() => {
            const x = Math.random() * window.innerWidth;
            const y = Math.random() * (window.innerHeight * 0.7);
            createExplosion(x, y, true);
            count++;
            if(count > 25) clearInterval(timer);
        }, 200);
    }

    function isGenComplete(index) {
        const gen = generations[index];
        if(!gen) return false;
        for (let i = gen.start; i <= gen.end; i++) {
            if (!revealedIds.has(i)) return false;
        }
        return true;
    }

    function showCongrats() {
        const gen = generations[currentGen];
        const nextGen = generations[currentGen + 1];
        let msg = `Você completou a coleção de ${gen.name}!`;
        if (nextGen) msg += `<br><span style="font-size: 1.2rem; color: var(--poke-gold);">A região de ${nextGen.name} foi desbloqueada!</span>`;
        document.getElementById('congratsMsg').innerHTML = msg;
        document.getElementById('congratsOverlay').style.display = 'flex';
        launchFireworks();
        playVictorySound();
        renderNav(); 
    }

    function renderNav() {
        const nav = document.getElementById('genNav');
        nav.innerHTML = '';
        generations.forEach((g, i) => {
            const btn = document.createElement('button');
            const isLocked = i > 0 && !isGenComplete(i - 1);
            btn.className = `gen-btn ${i === currentGen ? 'active' : ''} ${isLocked ? 'locked' : ''}`;
            btn.innerHTML = `${isLocked ? '🔒 ' : ''}${g.name}`; 
            btn.onclick = () => {
                if (isLocked) return;
                currentGen = i;
                document.getElementById('gen-title').innerText = `REGIÃO DE ${g.name.toUpperCase()}`; 
                
                // Mudar número na pokebola para "?" se a região estiver completa ao navegar
                if(isGenComplete(i)){
                    document.getElementById('pokeNum').innerText = "?";
                }

                renderNav();
                render();
            };
            nav.appendChild(btn);
        });
    }

    function render() {
        const grid = document.getElementById('pokedex');
        const rollBtn = document.getElementById('rollBtn');
        const progressBar = document.getElementById('progressBar');
        const progressCount = document.getElementById('progressCount');
        grid.innerHTML = '';
        const gen = generations[currentGen];
        let countRevealed = 0;
        const totalGen = (gen.end - gen.start) + 1;
        for (let i = gen.start; i <= gen.end; i++) { if (revealedIds.has(i)) countRevealed++; }
        const percent = (countRevealed / totalGen) * 100;
        progressBar.style.width = percent + "%";
        progressCount.innerText = `${countRevealed}/${totalGen}`;

        if(isGenComplete(currentGen)) {
            rollBtn.innerText = "COLEÇÃO COMPLETA";
            rollBtn.disabled = true;
        } else if (waitingForReveal) {
            rollBtn.innerText = "VIRE A CARTA";
            rollBtn.disabled = true;
        } else {
            rollBtn.innerText = "CAPTURAR POKÉMON";
            rollBtn.disabled = false;
        }

        for (let i = gen.start; i <= gen.end; i++) {
            const slot = document.createElement('div');
            slot.className = `pokemon-slot ${unlockedIds.has(i) ? 'unlocked' : ''} ${revealedIds.has(i) ? 'revealed' : ''}`;
            slot.id = `slot-${i}`;
            const numText = String(i).padStart(3, '0');
            
            slot.innerHTML = `
                <div class="slot-face slot-back">${numText}</div>
                <div class="slot-face slot-front">
                    <span class="slot-id">#${numText}</span>
                    <img src="${getImagePath(i)}" class="pokemon-img" onerror="this.style.opacity='0.25'; this.alt='Imagem não encontrada';">
                </div>`;
            
            slot.onclick = (e) => {
                if (!unlockedIds.has(i)) return;
                
                // Resetar número na pokebola para "?" ao revelar personagem
                if (!revealedIds.has(i)) {
                    document.getElementById('pokeNum').innerText = "?"; 
                    
                    if (waitingForReveal) waitingForReveal = false;
                    slot.classList.remove('target-pulse');
                    revealedIds.add(i);
                    save();
                    playRevealSound();
                    createExplosion(e.clientX, e.clientY);
                    slot.classList.add('revealed');
                    setTimeout(() => {
                        render();
                        if(isGenComplete(currentGen)) showCongrats();
                    }, 500);
                } else {
                    openZoom(i);
                }
            };
            grid.appendChild(slot);
        }
    }

    function openZoom(id) {
        const modalName = document.getElementById('modalName');
        const modalId = document.getElementById('modalId');
        const modalImg = document.getElementById('modalImg');
        const modalVideo = document.getElementById('modalVideo');
        const modalCard = document.getElementById('modalCard');
        
        modalCard.classList.remove('flipped');
        modalVideo.pause();
        modalVideo.currentTime = 0;

        modalImg.src = getImagePath(id);
        modalVideo.querySelector('source').src = `${VIDEO_PATH}${id}.mp4`;
        modalVideo.load();

        modalId.innerText = `#${String(id).padStart(3, '0')}`;
        modalName.innerText = pokemonData[id] || "Variação";
        
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function flipModal(event) {
        event.stopPropagation();
        const card = document.getElementById('modalCard');
        const video = document.getElementById('modalVideo');
        
        if (!card.classList.contains('flipped')) {
            card.classList.add('flipped');
            video.play();

            setTimeout(() => {
                if (card.classList.contains('flipped')) {
                    card.classList.remove('flipped');
                    video.pause();
                }
            }, 2800);
            
        } else {
            card.classList.remove('flipped');
            video.pause();
        }
    }

    function closeModal() {
        document.getElementById('modalOverlay').style.display = 'none';
        const video = document.getElementById('modalVideo');
        video.pause();
    }

    function startCapture() {
        if (waitingForReveal || isGenComplete(currentGen)) return;
        const btn = document.getElementById('rollBtn');
        const ball = document.getElementById('pokeBall');
        const num = document.getElementById('pokeNum');
        const gen = generations[currentGen];
        const availableInGen = [];
        for (let i = gen.start; i <= gen.end; i++) { if (!unlockedIds.has(i)) availableInGen.push(i); }
        if (availableInGen.length === 0) return;
        btn.disabled = true;
        ball.classList.add('rolling');
        const interval = setInterval(() => {
            playRollSound();
            num.innerText = Math.floor(Math.random() * (gen.end - gen.start + 1)) + gen.start;
        }, 100);
        setTimeout(() => {
            clearInterval(interval);
            ball.classList.remove('rolling');
            const luckyNum = availableInGen[Math.floor(Math.random() * availableInGen.length)];
            num.innerText = luckyNum;
            unlockedIds.add(luckyNum);
            save();
            waitingForReveal = true;
            render();

            setTimeout(() => {
                const targetSlot = document.getElementById(`slot-${luckyNum}`);
                if (targetSlot) {
                    targetSlot.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    targetSlot.classList.add('target-pulse');
                }
            }, 800); 

        }, 1500);
    }

    carregarMapa().then(() => {
        renderNav();
        render();
    });
</script>

</body>
</html>
