<!DOCTYPE html><html lang="pt-br"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Álbum Digital - Monster Collector</title>
    <style>
        :root {
            --gold: #ffcb05;
            --pokered: #e4000f;
            --pokewhite: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            background: linear-gradient(
                var(--pokered) 0%, 
                var(--pokered) 45vh, 
                var(--pokewhite) 45vh, 
                var(--pokewhite) 100%
            );
        }

        /* --- TÍTULO --- */
        @keyframes pulseBorder {
            0% { text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000; }
            50% { text-shadow: -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000, 3px 3px 0 #000; }
            100% { text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000; }
        }

        .luxury-header {
            width: 100%; text-align: center; padding: 20px 10px 10px; position: absolute; top: 0; z-index: 20;
        }

        .luxury-header h1 {
            margin: 0; font-size: 32px; font-weight: 900; text-transform: uppercase; color: #fff; letter-spacing: 3px;
            font-family: 'Arial Black', sans-serif; animation: pulseBorder 2s infinite ease-in-out;
        }

        .header-line {
            width: 90%; height: 6px; background: #000; margin: 5px auto 0; border-top: 2px solid #fff; border-bottom: 2px solid #fff; border-radius: 2px;
        }

        .glow-symbol {
            display: inline-block; color: #000; -webkit-text-stroke: 2px #fff; font-size: 80px; font-weight: 900;
            animation: pulseGlowSymbol 1.2s infinite ease-in-out;
        }

        @keyframes pulseGlowSymbol {
            0% { filter: drop-shadow(0 0 2px #fff); transform: scale(1); }
            50% { filter: drop-shadow(0 0 10px #fff); transform: scale(1.15); }
            100% { filter: drop-shadow(0 0 2px #fff); transform: scale(1); }
        }

        /* --- STAGE --- */
        .stage { 
            height: 45vh; display: flex; justify-content: center; align-items: center; position: relative; z-index: 10; padding-top: 90px;
        }

        .card-pile { position: relative; width: 150px; height: 210px; perspective: 1200px; }
        .card { position: absolute; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.6s, left 0.6s ease-out, opacity 0.4s; left: -150vw; opacity: 0; cursor: pointer; }
        .card.at-center { left: 0 !important; opacity: 1; }
        .card.flipped { transform: rotateY(180deg); }
        .card.exit-right { left: 200vw !important; opacity: 0; }
        
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 12px; border: 4px solid #000; box-shadow: 0 8px 25px rgba(0,0,0,0.5); }
        .face-back { display: flex; justify-content: center; align-items: center; background: url('fundo carta.png') center/cover no-repeat; background-color: #e4000f; }
        .face-front { transform: rotateY(180deg); display: flex; flex-direction: column; padding: 10px; background: #ffffff; }
        
        .img-monster { flex: 1; width: 100%; background-size: contain; background-repeat: no-repeat; background-position: center; }
        .label-monster { text-align: center; padding: 6px 0; border-top: 2px solid #eee; margin-top: 5px; }
        .txt-name { color: #222; font-size: 10px; font-weight: 900; display: block; text-transform: uppercase; }

        /* --- CONTROLES --- */
        .belt { height: 45px; background: #000; width: 100%; display: flex; justify-content: center; align-items: center; position: relative; z-index: 100; border-top: 2px solid #fff; border-bottom: 2px solid #fff; }
        #btn-open { width: 85px; height: 85px; background: url('botão pokebola.png') center/contain no-repeat; border: none; cursor: pointer; position: absolute; z-index: 110; transition: transform 0.1s; }
        #btn-open:active { transform: scale(0.9); }

        /* --- COLEÇÃO --- */
        .collection-area { flex: 1; overflow-y: auto; padding: 45px 15px 100px; }
        .gen-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 420px; margin: 0 auto; }
        .gen-box { 
            aspect-ratio: 1/1; background: #fff; border: 3px solid #000; border-radius: 12px; 
            display: flex; flex-direction: column; cursor: pointer; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .gen-box-header { background: var(--pokered); height: 35%; border-bottom: 3px solid #000; display: flex; justify-content: center; align-items: center; color: #fff; font-weight: 900; font-size: 16px; }
        .gen-box-body { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .gen-box h3 { margin: 0; font-size: 13px; text-transform: uppercase; font-weight: 900; color: #000; }
        .gen-box span { font-size: 14px; font-weight: bold; color: var(--pokered); }

        /* --- MODAL DE LISTAGEM --- */
        #modal-gen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 1000; display: none; flex-direction: column; }
        .modal-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #000; background: var(--pokered); color: #fff; }
        .modal-grid { flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 10px; overflow-y: auto; align-content: start; }
        .slot { min-height: 90px; background: #f9f9f9; border: 1px solid #ddd; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .slot.owned { border: 2.5px solid #000; cursor: pointer; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .slot-img-mini { width: 85%; height: 60px; background-size: contain; background-repeat: no-repeat; background-position: center; }
        .slot span { font-size: 12px; font-weight: 900; color: #999; } 

        /* --- MODAL DE DETALHE (CORRIGIDO PARA SER SEMPRE QUADRADO) --- */
        #modal-detail { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: none; justify-content: center; align-items: center; }
        .detail-content { 
            width: 85vw; height: 85vw; /* Altura igual à largura para ser quadrado */
            max-width: 450px; max-height: 450px; 
            background: #000; border: 5px solid var(--gold); 
            border-radius: 20px; position: relative; overflow: hidden; display: flex; flex-direction: column;
        }
        .media-container {
            flex: 1;
            background: #fff;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding-bottom: 12px;
        }

        #detail-video,
        #detail-image {
            width: 100%;
            height: 100%;
            display: none;
            object-fit: contain;
            object-position: center center;
            padding: 20px 20px 65px 20px;
            background: #fff;
            box-sizing: border-box;
        }

        #detail-footer { 
            background: rgba(255,255,255,0.9); border-top: 3px solid #000; padding: 8px; text-align: center; 
            position: absolute; bottom: 0; width: 100%; display: none; z-index: 2050;
        }
        .detail-name { font-size: 14px; font-weight: 900; color: #000; text-transform: uppercase; }
        
        .btn-close-detail { position: absolute; top: 10px; right: 10px; background: var(--pokered); color: #fff; border: 3px solid #000; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; z-index: 2100; font-weight: 900; }
        .btn-back { background: #000; color: #fff; border: 2px solid #fff; padding: 8px 15px; font-weight: 900; border-radius: 8px; cursor: pointer; }


        /* --- TRAVAS ANTI-CÓPIA / ARRASTAR / SELEÇÃO --- */
        html, body, * {
            -webkit-user-select: none !important;
            -moz-user-select: none !important;
            -ms-user-select: none !important;
            user-select: none !important;
            -webkit-touch-callout: none !important;
        }

        img, video, .img-monster, .slot-img-mini, .face, .card, .gen-box {
            -webkit-user-drag: none !important;
            user-drag: none !important;
            pointer-events: auto;
        }


        /* --- REGIÕES BLOQUEADAS / MODAL DE COMPRA --- */
        .gen-box.locked {
            position: relative;
            filter: grayscale(0.92) brightness(0.82);
            cursor: pointer;
        }

        .gen-box.locked::after {
            content: "🔒";
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.48);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 38px;
            text-shadow: 0 3px 0 #000;
        }

        .gen-box.locked .gen-box-body span {
            color: #333;
        }

        #modal-complete {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            z-index: 3000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .complete-box {
            width: 100%;
            max-width: 390px;
            background: #fff;
            border: 5px solid var(--gold);
            border-radius: 22px;
            padding: 24px 18px;
            text-align: center;
            box-shadow: 0 0 35px rgba(255,203,5,0.55);
            color: #111;
            animation: completePop .28s ease-out;
        }

        @keyframes completePop {
            from { transform: scale(.85); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .complete-icon {
            font-size: 50px;
            margin-bottom: 8px;
        }

        .complete-box h2 {
            margin: 0 0 10px;
            color: var(--pokered);
            font-size: 24px;
            text-transform: uppercase;
            font-family: 'Arial Black', sans-serif;
        }

        .complete-box p {
            margin: 8px 0;
            font-size: 15px;
            font-weight: 700;
            line-height: 1.35;
        }

        .btn-buy {
            display: inline-block;
            margin-top: 16px;
            background: #25D366;
            color: #fff;
            text-decoration: none;
            border: 3px solid #000;
            border-radius: 999px;
            padding: 12px 22px;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 0 5px 0 #111;
        }

        .btn-buy:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #111;
        }

        .btn-close-complete {
            margin-top: 14px;
            background: #000;
            color: #fff;
            border: 2px solid #000;
            border-radius: 999px;
            padding: 9px 18px;
            font-weight: 900;
            cursor: pointer;
        }

        /* --- MODAL DE ATIVAÇÃO DE CHAVE --- */
        .key-area {
            margin-top: 16px;
            padding-top: 14px;
            border-top: 2px dashed rgba(0,0,0,0.25);
        }

        .key-area label {
            display: block;
            font-size: 13px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: #111;
        }

        #access-key-input {
            width: 100%;
            border: 3px solid #000;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            font-size: 16px;
            font-weight: 900;
            text-transform: uppercase;
            outline: none;
            background: #fff;
            color: #111;
            user-select: text !important;
            -webkit-user-select: text !important;
        }

        .btn-activate-key {
            width: 100%;
            margin-top: 10px;
            background: var(--pokered);
            color: #fff;
            border: 3px solid #000;
            border-radius: 999px;
            padding: 12px 18px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 5px 0 #111;
        }

        .btn-activate-key:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #111;
        }

        .key-message {
            min-height: 20px;
            margin-top: 10px;
            font-size: 13px;
            font-weight: 900;
            color: var(--pokered);
        }

        body.full-access .gen-box.locked {
            filter: none;
        }

        body.full-access .gen-box.locked::after {
            display: none;
        }


    </style></head><body>

<header class="luxury-header">
    <h1>Álbum Digital</h1>
    <div class="header-line"></div>
</header>

<div class="stage"><div class="card-pile" id="pile"></div></div>
<div class="belt"><button id="btn-open" onclick="startOpening()"></button></div>
<div class="collection-area"><div class="gen-grid" id="menuGrid"></div></div>

<div id="modal-gen">
    <div class="modal-header">
        <h2 id="modal-title" style="margin:0;"></h2>
        <button class="btn-back" onclick="closeModal()">VOLTAR</button>
    </div>
    <div class="modal-grid" id="modalContent"></div>
</div>

<div id="modal-detail">
    <div class="detail-content" id="detail-box">
        <button class="btn-close-detail" onclick="closeDetail()">X</button>
        <div class="media-container">
            <video id="detail-video" playsinline></video>
            <img id="detail-image" onclick="closeDetail()">
        </div>
        <div id="detail-footer">
            <div id="detail-monster-name" class="detail-name"></div>
        </div>
    </div>
</div>


<div id="modal-complete">
    <div class="complete-box">
        <div class="complete-icon" id="complete-icon">🏆</div>
        <h2 id="complete-title">Parabéns!</h2>
        <p id="complete-text">Você completou a coleção da primeira geração.</p>
        <p>Para desbloquear todas as outras regiões, basta comprar o pacote completo.</p>
        <a class="btn-buy" id="btn-buy-whatsapp" href="#" target="_blank" rel="noopener">COMPRAR PACOTE COMPLETO</a>

        <div class="key-area">
            <label for="access-key-input">Já comprou? Digite sua chave</label>
            <input id="access-key-input" type="text" placeholder="EX: TESTE123" autocomplete="off">
            <button class="btn-activate-key" onclick="activateKey()">LIBERAR PACOTE COMPLETO</button>
            <div class="key-message" id="key-message"></div>
        </div>

        <br>
        <button class="btn-close-complete" onclick="closeCompleteModal()">FECHAR</button>
    </div>
</div>

        document.getElementById('complete-title').innerText = isCompletion ? 'Parabéns!' : 'Região bloqueada';
        document.getElementById('complete-text').innerText = isCompletion
            ? 'Você completou a coleção da primeira geração!'
            : 'Esta região faz parte do pacote completo.';
        document.getElementById('btn-buy-whatsapp').href = WHATSAPP_LINK;
        document.getElementById('key-message').innerText = '';
        document.getElementById('modal-complete').style.display = 'flex';
    }

    function closeCompleteModal() {
        document.getElementById('modal-complete').style.display = 'none';
    }

    function getDeviceId() {
        let deviceId = localStorage.getItem('album_device_id');
        if(!deviceId) {
            deviceId = 'device_' + Date.now() + '_' + Math.random().toString(36).substring(2, 12);
            localStorage.setItem('album_device_id', deviceId);
        }
        return deviceId;
    }

    function setFullAccess(value) {
        fullAccessUnlocked = value === true;
        if(fullAccessUnlocked) {
            localStorage.setItem('album_full_access', 'yes');
            document.body.classList.add('full-access');
        } else {
            localStorage.removeItem('album_full_access');
            document.body.classList.remove('full-access');
        }
        renderMenu();
    }

    async function activateKey() {
        const input = document.getElementById('access-key-input');
        const msg = document.getElementById('key-message');
        const keyCode = input.value.trim().toUpperCase();

        if(!keyCode) {
            msg.innerText = 'Digite sua chave de acesso.';
            return;
        }

        msg.innerText = 'Validando chave...';

        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/rpc/activate_access_key`, {
                method: 'POST',
                headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    p_key_code: keyCode,
                    p_device_id: getDeviceId()
                })
            });

            const data = await response.json();

            if(!response.ok) {
                msg.innerText = 'Erro ao validar. Confira a configuração do Supabase.';
                return;
            }

            const result = Array.isArray(data) ? data[0] : data;

            if(result && result.success && result.plan === 'full') {
                setFullAccess(true);
                msg.style.color = '#078c32';
                msg.innerText = 'Pacote completo liberado neste aparelho!';
                setTimeout(closeCompleteModal, 900);
            } else {
                msg.style.color = 'var(--pokered)';
                msg.innerText = result && result.message ? result.message : 'Chave inválida.';
            }
        } catch (error) {
            msg.style.color = 'var(--pokered)';
            msg.innerText = 'Falha de conexão. Verifique sua internet.';
        }
    }

    function renderMenu() {
        const grid = document.getElementById('menuGrid');
        grid.innerHTML = '';
        categorias.forEach(cat => {
            const owned = myCollection.filter(id => id >= cat.start && id <= cat.end).length;
            const locked = cat.id !== 1 && !fullAccessUnlocked;
            const box = document.createElement('div');
            box.className = locked ? 'gen-box locked' : 'gen-box';
            box.onclick = () => locked ? openCompleteModal(false) : openModal(cat);
            box.innerHTML = `<div class="gen-box-header">${cat.tag}</div><div class="gen-box-body"><h3>${cat.name}</h3><span>${locked ? 'BLOQUEADO' : owned + '/' + ((cat.end-cat.start)+1)}</span></div>`;
            grid.appendChild(box);
        });
    }

    async function startOpening() {
        if(busy) return; busy = true;
        document.getElementById('btn-open').disabled = true;
        const pile = document.getElementById('pile');
        pile.innerHTML = ''; currentCards = [];
        for(let i=0; i<10; i++) {
            const maxCardId = fullAccessUnlocked ? 1257 : 151;
            const id = Math.floor(Math.random() * maxCardId) + 1;
            const card = createCard(i, id);
            pile.appendChild(card);
            currentCards.push(card);
            setTimeout(() => { card.classList.add('at-center'); playPopSound(); }, i * 100);
        }
        busy = false;
    }

    function createCard(idx, id) {
        const div = document.createElement('div');
        div.className = 'card'; div.style.zIndex = 100 - idx; div.dataset.id = id;
        div.innerHTML = `
            <div class="face face-back"><span class="glow-symbol">?</span></div>
            <div class="face face-front">
                <div class="img-monster" style="background-image: url('img/${id}.png')"></div>
                <div class="label-monster"><span class="txt-name">#${id} ${getMonsterName(id)}</span></div>
            </div>`;
        div.onclick = () => flipCard(div);
        return div;
    }

    function flipCard(card) {
        if(card !== currentCards[0]) return;
        const id = parseInt(card.dataset.id);
        if(!card.classList.contains('flipped')) {
            card.classList.add('flipped');
            playPopSound();
            if(!myCollection.includes(id)) { 
                myCollection.push(id); 
                localStorage.setItem('pokedex_save', JSON.stringify(myCollection));
                renderMenu();

                if(isFirstGenerationComplete() && localStorage.getItem('kanto_complete_modal_shown') !== 'yes') {
                    localStorage.setItem('kanto_complete_modal_shown', 'yes');
                    setTimeout(() => openCompleteModal(true), 700);
                }
            }
        } else {
            card.classList.add('exit-right'); 
            playMachineGunSound();
            currentCards.shift();
            if(currentCards.length === 0) document.getElementById('btn-open').disabled = false;
        }
    }

    function openModal(cat) {
        if(cat.id !== 1 && !fullAccessUnlocked) {
            openCompleteModal(false);
            return;
        }

        const grid = document.getElementById('modalContent');
        document.getElementById('modal-title').innerText = cat.name.toUpperCase();
        grid.innerHTML = '';
        for(let i=cat.start; i<=cat.end; i++) {
            const slot = document.createElement('div');
            slot.className = 'slot';
            if(myCollection.includes(i)) {
                slot.classList.add('owned');
                slot.onclick = () => openDetail(i);
                slot.innerHTML = `<div class="slot-img-mini" style="background-image: url('img/${i}.png')"></div>`;
            } else { slot.innerHTML = `<span>#${i}</span>`; }
            grid.appendChild(slot);
        }
        document.getElementById('modal-gen').style.display = 'flex';
    }

    function openDetail(id) {
        const modal = document.getElementById('modal-detail');
        const video = document.getElementById('detail-video');
        const image = document.getElementById('detail-image');
        const footer = document.getElementById('detail-footer');
        const nameLabel = document.getElementById('detail-monster-name');
        
        video.style.display = 'none'; image.style.display = 'none'; footer.style.display = 'none';
        modal.style.display = 'flex';
        video.src = `video/${id}.mp4`;
        
        let hasVideo = false;
        video.oncanplay = () => { 
            if(!hasVideo) { 
                hasVideo = true; video.style.display = 'block'; footer.style.display = 'none'; 
                video.play(); 
            } 
        };
        video.onended = () => { setTimeout(closeDetail, 500); };
        video.onerror = () => { showImageMode(id); };
        setTimeout(() => { if(!hasVideo) { video.pause(); showImageMode(id); } }, 600);

        function showImageMode(id) {
            video.style.display = 'none';
            image.src = `img/${id}.png`;
            image.style.display = 'block';
            nameLabel.innerText = `#${id} ${getMonsterName(id)}`;
            footer.style.display = 'block'; 
        }
    }

    function closeDetail() {
        const video = document.getElementById('detail-video');
        video.pause(); video.src = "";
        document.getElementById('modal-detail').style.display = 'none';
    }

    function closeModal() { document.getElementById('modal-gen').style.display = 'none'; }

    // --- TRAVAS ANTI-CÓPIA / INSPECIONAR / ARRASTAR ---
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        return false;
    });

    document.addEventListener('dragstart', function(e) {
        e.preventDefault();
        return false;
    });

    document.addEventListener('selectstart', function(e) {
        e.preventDefault();
        return false;
    });

    document.addEventListener('copy', function(e) {
        e.preventDefault();
        return false;
    });

    document.addEventListener('cut', function(e) {
        e.preventDefault();
        return false;
    });

    document.addEventListener('keydown', function(e) {
        const key = e.key.toLowerCase();

        if (
            e.key === 'F12' ||
            (e.ctrlKey && e.shiftKey && (key === 'i' || key === 'j' || key === 'c')) ||
            (e.ctrlKey && (key === 'u' || key === 's' || key === 'p' || key === 'c' || key === 'a')) ||
            (e.metaKey && (key === 'u' || key === 's' || key === 'p' || key === 'c' || key === 'a'))
        ) {
            e.preventDefault();
            e.stopPropagation();
            return false;
        }
    });

    document.querySelectorAll('img, video').forEach(function(el) {
        el.setAttribute('draggable', 'false');
        el.setAttribute('ondragstart', 'return false');
        el.setAttribute('oncontextmenu', 'return false');
    });

    if(fullAccessUnlocked) {
        document.body.classList.add('full-access');
    }

    renderMenu();
</script></body></html>
